<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 280px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #09090b;
      color: #fafafa;
      margin: 0;
      border: 1px solid #ffffff10;
    }
    h2 {
      margin-top: 0;
      font-size: 16px;
      font-weight: 800;
      background: linear-gradient(to right, #818cf8, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p {
      font-size: 13px;
      color: #a1a1aa;
      line-height: 1.4;
      margin-bottom: 20px;
    }
    button {
      width: 100%;
      background-color: #4f46e5;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 6px;
      font-weight: 700;
      cursor: pointer;
      font-size: 14px;
      transition: background-color 0.2s;
    }
    button:hover {
      background-color: #4338ca;
    }
    .footer {
      margin-top: 16px;
      text-align: center;
      font-size: 11px;
      color: #52525b;
    }
  </style>
</head>
<body>
  <h2>News Analyst</h2>
  <p>Identify emotional manipulation, political bias, and raw facts on this page instantly.</p>
  <button id="analyzeBtn">Analyze Current Page</button>
  <div class="footer">Using Gemini Pro AI</div>
  <script src="popup.js"></script>
</body>
</html>
